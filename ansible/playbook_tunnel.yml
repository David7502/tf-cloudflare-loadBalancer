# ============================================
# ☁️ Playbook Tunnel - Cloudflared uniquement
# ============================================

- hosts: tunnel
  become: yes

  tasks:
    - name: Télécharger cloudflared
      get_url:
        url: https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
        dest: /tmp/cloudflared.deb
        mode: "0644"

    - name: Installer cloudflared
      apt:
        deb: /tmp/cloudflared.deb
        state: present

    - name: Installer le service cloudflared avec le token
      command: cloudflared service install {{ tunnel_token }}
      args:
        creates: /etc/systemd/system/cloudflared.service

    - name: Démarrer et activer cloudflared
      service:
        name: cloudflared
        state: started
        enabled: yes
