# ============================================
# ☁️ Playbook Tunnel - Cloudflared uniquement
# ============================================

- hosts: tunnel
  become: yes

  tasks:
    - name: Mettre à jour apt
      apt:
        update_cache: yes

    - name: Créer le répertoire keyrings
      file:
        path: /usr/share/keyrings
        state: directory
        mode: "0755"

    - name: Ajouter la clé GPG de Cloudflare
      shell: curl -fsSL https://pkg.cloudflare.com/cloudflare-public-v2.gpg | tee /usr/share/keyrings/cloudflare-public-v2.gpg >/dev/null
      args:
        creates: /usr/share/keyrings/cloudflare-public-v2.gpg

    - name: Ajouter le repository Cloudflared
      lineinfile:
        path: /etc/apt/sources.list.d/cloudflared.list
        line: "deb [signed-by=/usr/share/keyrings/cloudflare-public-v2.gpg] https://pkg.cloudflare.com/cloudflared any main"
        create: true
        mode: "0644"

    - name: Installer cloudflared
      apt:
        name: cloudflared
        state: present
        update_cache: yes

    - name: Créer le répertoire de configuration cloudflared
      file:
        path: /etc/cloudflared
        state: directory
        mode: "0755"

    - name: Configurer le tunnel cloudflared
      copy:
        dest: /etc/cloudflared/config.yml
        content: |
          tunnel: {{ tunnel_id }}
          credentials-file: /etc/cloudflared/{{ tunnel_id }}.json
          ingress:
            - hostname: {{ tunnel_hostname }}
              service: http://{{ web_server_ip }}:80
            - service: http_status:404
        mode: "0600"

    - name: Créer le fichier credentials cloudflared
      copy:
        dest: /etc/cloudflared/{{ tunnel_id }}.json
        content: "{{ tunnel_credentials | to_json }}"
        mode: "0600"

    - name: Installer le service cloudflared
      command: cloudflared service install
      args:
        creates: /etc/systemd/system/cloudflared.service

    - name: Démarrer et activer cloudflared
      service:
        name: cloudflared
        state: started
        enabled: yes
