# ============================================
# 🌐 VMs Web (nginx)
# ============================================

[web]
# Remplacer VM_WEB_EU_IP et VM_WEB_US_IP par les IPs après terraform apply
vm-web-europe ansible_host=VM_WEB_EU_IP ansible_user=david ansible_ssh_private_key_file=~/.ssh/id_ed25519 region=europe-west1
vm-web-us ansible_host=VM_WEB_US_IP ansible_user=david ansible_ssh_private_key_file=~/.ssh/id_ed25519 region=us-central1

# ============================================
# ☁️ VMs Tunnel (cloudflared)
# ============================================

[tunnel]
# Remplacer les IPs après terraform apply
# web_server_ip = IP interne de la VM web dans le même subnet
vm-tunnel-europe ansible_host=VM_TUNNEL_EU_IP ansible_user=david ansible_ssh_private_key_file=~/.ssh/id_ed25519 web_server_ip=10.0.0.2
vm-tunnel-us ansible_host=VM_TUNNEL_US_IP ansible_user=david ansible_ssh_private_key_file=~/.ssh/id_ed25519 web_server_ip=10.1.0.2
